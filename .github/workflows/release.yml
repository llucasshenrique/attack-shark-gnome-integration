name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref_name || github.sha }}
  cancel-in-progress: false

jobs:
  build-packages:
    name: Build DEB/RPM
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI artifacts
        run: bun run compile

      - name: Build DEB package
        run: sh ./scripts/package-deb.sh

      - name: Build RPM package
        run: sh ./scripts/package-rpm.sh

      - name: Upload packages artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: dist/packages/*
          if-no-files-found: error

  test-packages:
    name: Test Packages (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: build-packages
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-12
            dockerfile: .docker/Dockerfile.deb
            base_image: debian:12
          - name: ubuntu-22-04
            dockerfile: .docker/Dockerfile.deb
            base_image: ubuntu:22.04
          - name: ubuntu-24-04
            dockerfile: .docker/Dockerfile.deb
            base_image: ubuntu:24.04
          - name: fedora-41
            dockerfile: .docker/Dockerfile.rpm
            base_image: fedora:41
          - name: fedora-43
            dockerfile: .docker/Dockerfile.rpm
            base_image: fedora:43
          - name: ubi-9
            dockerfile: .docker/Dockerfile.rpm
            base_image: registry.access.redhat.com/ubi9/ubi

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: linux-packages
          path: dist/packages

      - name: Build and run container test
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            -f ${{ matrix.dockerfile }} \
            -t attack-shark-cli-test:${{ matrix.name }} \
            .

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build-packages
      - test-packages
    permissions:
      contents: write
      packages: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          if bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.exit(pkg.scripts?.build ? 0 : 1)"; then
            bun run build
          else
            echo "No build script configured; skipping."
          fi

      - name: Build extension artifacts
        run: |
          # build CLI binary + ESM bundle and copy extension into dist/
          bun run clean || true
          bun run compile
          bun run copy-extension
          bun run copy-cli || true
          ls -la dist || true

      - name: Download Linux packages artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-packages
          path: dist/packages

      - name: Ensure release exists
        run: |
          set -euo pipefail
          TAG=${{ github.ref_name }}
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare and zip release artifacts
        run: |
          set -euo pipefail

          RELEASE_TAG=${{ github.ref_name }}
          EXT_UUID=$(bun -e "const meta = JSON.parse(await Bun.file('extension/metadata.json').text()); console.log(meta.uuid)")

          # Extension package: folder name must match GNOME extension UUID.
          mv "dist/extension" "dist/${EXT_UUID}"
          cp cli/udev/99-attack-shark.rules "dist/${EXT_UUID}/99-attack-shark.rules"

          cat > "dist/${EXT_UUID}/INSTALL.md" <<'EOF'
          # Instalar a extensao do GNOME

          ## 1) Copiar a pasta da extensao

          Copie a pasta (nomeada com o UUID) para:

          - `~/.local/share/gnome-shell/extensions/`

          Exemplo:

          ```bash
          cp -r attack-shark-x11@llucasshenrique ~/.local/share/gnome-shell/extensions/
          ```

          ## 2) Aplicar regra udev

          O arquivo `99-attack-shark.rules` esta incluido neste pacote.

          ```bash
          sudo cp 99-attack-shark.rules /etc/udev/rules.d/
          sudo udevadm control --reload-rules
          sudo udevadm trigger
          ```

          ## 3) Habilitar a extensao

          ```bash
          gnome-extensions enable attack-shark-x11@llucasshenrique
          ```

          ## 4) Recarregar o GNOME Shell

          - Wayland: faca logout/login.
          - X11: `Alt+F2`, digite `r`, pressione Enter.
          EOF

          (
            cd dist
            zip -r "attack-shark-extension-${RELEASE_TAG}.zip" "${EXT_UUID}"
          )

          # Pure CLI package: binary + ESM + udev rules.
          mkdir -p dist/cli
          cp dist/attack-shark-cli dist/cli/attack-shark-cli
          cp dist/attack-shark-cli.mjs dist/cli/attack-shark-cli.mjs
          cp cli/udev/99-attack-shark.rules dist/cli/99-attack-shark.rules

          cat > dist/cli/INSTALL.md <<'EOF'
          # Instalar a CLI pura

          ## 1) Instalar o binario

          ```bash
          sudo cp attack-shark-cli /usr/local/bin/
          sudo chmod +x /usr/local/bin/attack-shark-cli
          ```

          ## 2) Aplicar regra udev

          O arquivo `99-attack-shark.rules` esta incluido neste pacote.

          ```bash
          sudo cp 99-attack-shark.rules /etc/udev/rules.d/
          sudo udevadm control --reload-rules
          sudo udevadm trigger
          ```

          ## 3) Uso basico

          ```bash
          attack-shark-cli battery
          attack-shark-cli dpi 1600
          attack-shark-cli polling 500
          ```

          Opcional: `attack-shark-cli.mjs` para uso como modulo ESM.
          EOF

          (
            cd dist
            zip -r "attack-shark-cli-${RELEASE_TAG}.zip" cli
            ls -la *.zip
          )

      - name: Upload release ZIPs via gh
        run: |
          set -euo pipefail

          TAG=${{ github.ref_name }}
          EXT_ASSET=./dist/attack-shark-extension-${{ github.ref_name }}.zip
          CLI_ASSET=./dist/attack-shark-cli-${{ github.ref_name }}.zip
          DEB_ASSET=$(ls -1 ./dist/packages/*.deb | head -n1)
          RPM_ASSET=$(ls -1 ./dist/packages/*.rpm | head -n1)

          echo "Preparing upload for $EXT_ASSET, $CLI_ASSET, $DEB_ASSET and $RPM_ASSET to release $TAG"

          mapfile -t EXISTING_ASSETS < <(gh release view "$TAG" --json assets --jq '.assets[].name' || true)

          has_asset() {
            local asset_name="$1"
            printf '%s\n' "${EXISTING_ASSETS[@]}" | grep -Fxq "$asset_name"
          }

          upload_with_retry() {
            local asset_path="$1"
            local asset_name
            asset_name=$(basename "$asset_path")

            if has_asset "$asset_name"; then
              echo "Asset already exists, skipping: $asset_name"
              return 0
            fi

            for attempt in 1 2 3 4 5; do
              if gh release upload "$TAG" "$asset_path" --clobber; then
                echo "Uploaded: $asset_name"
                return 0
              fi

              echo "Upload failed for $asset_name (attempt $attempt/5). Retrying..."
              sleep $((attempt * 3))
            done

            echo "Failed to upload $asset_name after retries."
            return 1
          }

          upload_with_retry "$EXT_ASSET"
          upload_with_retry "$CLI_ASSET"
          upload_with_retry "$DEB_ASSET"
          upload_with_retry "$RPM_ASSET"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
