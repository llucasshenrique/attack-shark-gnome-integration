name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (overrides push tag)'
        required: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          if bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.exit(pkg.scripts?.build ? 0 : 1)"; then
            bun run build
          else
            echo "No build script configured; skipping."
          fi

      - name: Build extension artifacts
        run: |
          # build CLI binary + ESM bundle and copy extension into dist/
          bun run clean || true
          bun run compile
          bun run copy-extension
          bun run copy-cli || true
          ls -la dist || true

      - name: Zip extension artifact
        run: |
          cd dist
          zip -r attack-shark-extension-${{ github.ref_name || github.event.inputs.tag || 'release' }}.zip extension
          ls -la *.zip

      - name: Authenticate GitHub CLI
        run: |
          echo "Authenticating gh..."
          echo "$GITHUB_TOKEN" | gh auth login --with-token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload extension ZIP via gh
        run: |
          TAG=${{ github.event.release.tag_name || github.ref_name || github.event.inputs.tag }}
          ASSET=./dist/attack-shark-extension-${{ github.ref_name || github.event.inputs.tag || 'release' }}.zip
          echo "Uploading $ASSET to release $TAG"
          gh release upload "$TAG" "$ASSET" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
