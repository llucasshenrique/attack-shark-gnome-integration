name: Packages

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-packages:
    name: Build DEB/RPM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI artifacts
        run: bun run compile

      - name: Build DEB package
        run: sh ./scripts/package-deb.sh

      - name: Build RPM package
        run: sh ./scripts/package-rpm.sh

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/packages/*
          if-no-files-found: error

  test-packages:
    name: Test Packages (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: build-packages
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-12
            dockerfile: .docker/Dockerfile.deb
            base_image: debian:12
          - name: ubuntu-22-04
            dockerfile: .docker/Dockerfile.deb
            base_image: ubuntu:22.04
          - name: ubuntu-24-04
            dockerfile: .docker/Dockerfile.deb
            base_image: ubuntu:24.04
          - name: fedora-41
            dockerfile: .docker/Dockerfile.rpm
            base_image: fedora:41
          - name: fedora-43
            dockerfile: .docker/Dockerfile.rpm
            base_image: fedora:43
          - name: ubi-9
            dockerfile: .docker/Dockerfile.rpm
            base_image: registry.access.redhat.com/ubi9/ubi

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          name: linux-packages
          path: dist/packages

      - name: Build and run container test
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            -f ${{ matrix.dockerfile }} \
            -t attack-shark-cli-test:${{ matrix.name }} \
            .
